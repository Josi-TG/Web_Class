<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Lovers Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Puppy lovers page</h1>
    </div>

    <!-- Banner image -->
    <div class="banner">
        <img src="banner-puppies.jpg" alt="Puppies in basket">
    </div>

    <!-- puppy-1, missing box, puppy-2 -->
    <div class="puppy-row">
        <img src="puppy-1.jpg" alt="White puppy" class="puppy-img">
        
        <div class="missing-box">
            <p>Puppy<br>missing<br>here!!</p>
        </div>
        
        <img src="puppy-2.jpg" alt="Black puppy" class="puppy-img">
    </div>

    <!-- More Puppies heading -->
    <div class="more-heading">
        <h2>More Puppies</h2>
    </div>

    <!-- Two puppies side by side -->
    <div class="bottom-puppies">
        <img src="puppy-3.jpg" alt="Brown puppy" class="bottom-puppy-img">
        <img src="puppy-4.jpg" alt="White dog" class="bottom-puppy-img">
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Developed by: Yoseph Tigiste</p>
    </div>

</body>
</html>
